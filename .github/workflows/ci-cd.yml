name: CI/CD Pipeline - Azure Logic Apps CRUD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Permet de lancer manuellement

env:
  NODE_VERSION: '18'

jobs:
  # ============ JOB 1 : TESTS JEST ============
  jest-tests:
    name: 🧪 Tests Jest (28 tests)
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4
      
      - name: 🔧 Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: 📦 Installer les dépendances
        run: npm install
      
      - name: 🧪 Lancer les tests Jest
        run: npm test
        continue-on-error: false
      
      - name: 📊 Afficher le résumé des tests
        run: |
          echo "=========================================="
          echo "✅ TESTS JEST RÉUSSIS"
          echo "=========================================="

  # ============ JOB 2 : TEST API EN MÉMOIRE ============
  api-test:
    name: 🌐 Tests API (CRUD complet)
    runs-on: ubuntu-latest
    needs: jest-tests
    
    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4
      
      - name: 🔧 Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: 📦 Installer les dépendances
        run: npm install
      
      - name: 🚀 Démarrer l'API
        run: |
          node test-api.js &
          sleep 5
      
      - name: 🧪 Tester CREATE - Créer un item
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:3000/api/items \
            -H "Content-Type: application/json" \
            -H "x-api-key: mon-api-key-local-1234" \
            -d '{"name":"Item Test GitHub","price":99}')
          
          echo "CREATE Response: $RESPONSE"
          echo $RESPONSE | grep -q "id" && echo "✅ CREATE: OK" || exit 1
          
          # Sauvegarder l'ID
          ID=$(echo $RESPONSE | grep -o '"id":"[^"]*"' | cut -d'"' -f4)
          echo "ITEM_ID=$ID" >> $GITHUB_ENV
      
      - name: 📖 Tester READ ALL - Lister tous les items
        run: |
          RESPONSE=$(curl -s http://localhost:3000/api/items \
            -H "x-api-key: mon-api-key-local-1234")
          
          echo $RESPONSE | grep -q "Item Test GitHub" && echo "✅ READ ALL: OK" || exit 1
      
      - name: 🔍 Tester READ ONE - Lire un item spécifique
        run: |
          RESPONSE=$(curl -s http://localhost:3000/api/items/${{ env.ITEM_ID }} \
            -H "x-api-key: mon-api-key-local-1234")
          
          echo $RESPONSE | grep -q "${{ env.ITEM_ID }}" && echo "✅ READ ONE: OK" || exit 1
      
      - name: ✏️ Tester UPDATE - Mettre à jour un item
        run: |
          RESPONSE=$(curl -s -X PUT http://localhost:3000/api/items/${{ env.ITEM_ID }} \
            -H "Content-Type: application/json" \
            -H "x-api-key: mon-api-key-local-1234" \
            -d '{"name":"Item Modifié","price":149}')
          
          echo $RESPONSE | grep -q "Item Modifié" && echo "✅ UPDATE: OK" || exit 1
      
      - name: 🗑️ Tester DELETE - Supprimer un item
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
            http://localhost:3000/api/items/${{ env.ITEM_ID }} \
            -H "x-api-key: mon-api-key-local-1234")
          
          [ "$STATUS" = "204" ] && echo "✅ DELETE: OK" || exit 1
      
      - name: ✅ Résumé des tests API
        run: |
          echo "=========================================="
          echo "✅ TOUS LES TESTS API SONT RÉUSSIS"
          echo "   - CREATE ✅"
          echo "   - READ ALL ✅"
          echo "   - READ ONE ✅"
          echo "   - UPDATE ✅"
          echo "   - DELETE ✅"
          echo "=========================================="

  # ============ JOB 3 : TESTS D'AUTHENTIFICATION ============
  auth-test:
    name: 🔐 Tests Authentification
    runs-on: ubuntu-latest
    needs: api-test
    
    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4
      
      - name: 🔧 Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: 📦 Installer les dépendances
        run: npm install
      
      - name: 🚀 Démarrer l'API
        run: |
          node test-api.js &
          sleep 5
      
      - name: 🚫 Test sans clé API (doit retourner 401)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:3000/api/items \
            -H "Content-Type: application/json" \
            -d '{"name":"Test","price":10}')
          
          [ "$STATUS" = "401" ] && echo "✅ Sans clé API: 401 OK" || exit 1
      
      - name: 🚫 Test avec mauvaise clé API (doit retourner 401)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:3000/api/items \
            -H "Content-Type: application/json" \
            -H "x-api-key: mauvaise-clé" \
            -d '{"name":"Test","price":10}')
          
          [ "$STATUS" = "401" ] && echo "✅ Mauvaise clé API: 401 OK" || exit 1
      
      - name: ✅ Test avec bonne clé API (doit réussir)
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:3000/api/items \
            -H "Content-Type: application/json" \
            -H "x-api-key: mon-api-key-local-1234" \
            -d '{"name":"Test Auth","price":10}')
          
          echo $RESPONSE | grep -q "id" && echo "✅ Bonne clé API: 201 OK" || exit 1
      
      - name: ✅ Résumé tests authentification
        run: |
          echo "=========================================="
          echo "✅ TESTS D'AUTHENTIFICATION RÉUSSIS"
          echo "   - Sans clé API → 401 ✅"
          echo "   - Mauvaise clé → 401 ✅"
          echo "   - Bonne clé → 201 ✅"
          echo "=========================================="

  # ============ JOB 4 : VALIDATION DES WORKFLOWS JSON ============
  validate-workflows:
    name: 📋 Validation des workflows Logic Apps
    runs-on: ubuntu-latest
    needs: auth-test
    
    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4
      
      - name: 🔍 Vérifier que les fichiers workflow.json existent
        run: |
          echo "=========================================="
          echo "📋 VÉRIFICATION DES WORKFLOWS"
          echo "=========================================="
          
          [ -f "workflows/create/workflow.json" ] && echo "✅ CREATE workflow.json existe" || exit 1
          [ -f "workflows/read/workflow.json" ] && echo "✅ READ workflow.json existe" || exit 1
          [ -f "workflows/update/workflow.json" ] && echo "✅ UPDATE workflow.json existe" || exit 1
          [ -f "workflows/delete/workflow.json" ] && echo "✅ DELETE workflow.json existe" || exit 1
          
          echo ""
          echo "📊 Taille des fichiers:"
          ls -la workflows/*/workflow.json
      
      - name: 🔍 Valider le JSON des workflows
        run: |
          echo "🔍 Validation syntaxique des JSON..."
          
          # Vérifier que les JSON sont valides
          for file in workflows/*/workflow.json; do
            echo "Vérification: $file"
            cat "$file" | jq . > /dev/null 2>&1
            if [ $? -eq 0 ]; then
              echo "✅ $file est valide"
            else
              echo "❌ $file est invalide"
              exit 1
            fi
          done
      
      - name: 📝 Afficher le contenu des workflows
        run: |
          echo "=========================================="
          echo "📝 APERÇU DES WORKFLOWS"
          echo "=========================================="
          
          echo ""
          echo "--- CREATE workflow ---"
          cat workflows/create/workflow.json | jq '.definition.actions | keys'
          
          echo ""
          echo "--- READ workflow ---"
          cat workflows/read/workflow.json | jq '.definition.actions | keys'
          
          echo ""
          echo "✅ TOUS LES WORKFLOWS SONT VALIDES"
          echo "=========================================="
      
      - name: 💾 Upload des workflows comme artefact
        uses: actions/upload-artifact@v4
        with:
          name: logic-apps-workflows
          path: workflows/
          retention-days: 30

  # ============ JOB 5 : RAPPORT FINAL ============
  final-report:
    name: 📊 Rapport final
    runs-on: ubuntu-latest
    needs: [jest-tests, api-test, auth-test, validate-workflows]
    if: always()
    
    steps:
      - name: 📊 Générer le rapport
        run: |
          echo "=========================================="
          echo "📊 RAPPORT FINAL DU PIPELINE CI/CD"
          echo "=========================================="
          echo ""
          echo "✅ Tests Jest: ${{ needs.jest-tests.result }}"
          echo "✅ Tests API: ${{ needs.api-test.result }}"
          echo "✅ Tests Auth: ${{ needs.auth-test.result }}"
          echo "✅ Validation Workflows: ${{ needs.validate-workflows.result }}"
          echo ""
          echo "=========================================="
          echo "🎉 TOUS LES TESTS SONT PASSÉS !"
          echo "=========================================="
          echo ""
          echo "📦 Artefacts disponibles:"
          echo "   - logic-apps-workflows.zip"
          echo ""
          echo "📝 Projet prêt pour déploiement Azure"
          echo "=========================================="
      
      - name: Créer un badge de statut
        if: success()
        run: |
          echo "✅ CI/CD Pipeline - SUCCESS" > status.txt
          cat status.txt